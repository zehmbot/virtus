name: virtus

services:
  goose:
    build:
      context: .
      args:
        GOOSE_VERSION: ${GOOSE_VERSION:-1.43.0}
    image: virtus-goose
    container_name: virtus-goose
    env_file:
      - path: .env
        required: false
    volumes:
      - ./goose-home:/opt/data
      - ./projects:/opt/projects
      - ./personas:/opt/personas:ro
      - ./scripts:/opt/scripts:ro
    restart: unless-stopped
